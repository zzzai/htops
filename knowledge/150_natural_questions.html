<style>
*{box-sizing:border-box;margin:0;padding:0}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.tabs{display:flex;gap:8px;margin-bottom:4px}
.tab{padding:8px 18px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;white-space:nowrap}
.tab.active{background:#2E6B5E;color:#fff;border-color:#2E6B5E}
.tab:hover:not(.active){border-color:var(--color-border-primary);color:var(--color-text-primary)}
.meta{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--color-border-tertiary);margin-bottom:4px}
.meta-desc{font-size:12px;color:var(--color-text-secondary)}
.count-pill{font-size:11px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-secondary);padding:3px 10px;border-radius:20px;border:1px solid var(--color-border-tertiary)}
.panel{display:none}
.panel.active{display:block}
.cat{margin-top:18px}
.cat-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--color-border-tertiary)}
.cat-name{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.04em;text-transform:uppercase}
.api-tag{font-size:10px;padding:1px 7px;border-radius:20px;background:#E8F4F1;color:#0F6E56;font-weight:500;flex-shrink:0}
.q{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .1s;user-select:none}
.q:hover{background:var(--color-background-secondary)}
.q:active{background:var(--color-background-tertiary)}
.qn{font-size:11px;color:var(--color-text-tertiary);width:22px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.qt{font-size:14px;color:var(--color-text-primary);flex:1;line-height:1.5}
.qc{font-size:11px;color:var(--color-text-success);opacity:0;transition:opacity .25s;flex-shrink:0;min-width:32px}
.qc.show{opacity:1}
</style>

function render(id){
  const p=D[id], el=document.getElementById(id);
  let n=1, h=`<div class="meta"><span class="meta-desc">${p.desc}</span><span class="count-pill">50 个问法</span></div>`;
  for(const c of p.cats){
    h+=`<div class="cat"><div class="cat-hd"><span class="cat-name">${c.n}</span><span class="api-tag">API ${c.api}</span></div>`;
    for(const q of c.qs){
      const qs=q.replace(/'/g,"\\'");
      h+=`<div class="q" onclick="cp(this,'${qs}')"><span class="qn">${n++}</span><span class="qt">${q}</span><span class="qc">已复制</span></div>`;
    }
    h+='</div>';
  }
  el.innerHTML=h;
}

function cp(el,t){
  navigator.clipboard.writeText(t).catch(()=>{});
  const c=el.querySelector('.qc');
  c.classList.add('show');
  setTimeout(()=>c.classList.remove('show'),1100);
}

function sw(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}
